# Unity WebGL 自动构建 + 部署到 GitHub Pages
# 每次 push 到 main 分支时自动触发

name: Build Unity WebGL → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # 允许手动触发

# 保证一次只运行一个构建
concurrency:
  group: "unity-webgl-build"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # -------------------- 1. 检出代码 --------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # -------------------- 2. 缓存 Library 加速构建 --------------------
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-webgl-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-webgl-
            Library-${{ runner.os }}-

      # -------------------- 3. Unity WebGL 构建 --------------------
      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: 2022.3.0f1
          buildMethod: WebGLBuilder.Build
          versioning: None
          allowDirtyBuild: true

      # -------------------- 4. 生成 .nojekyll（禁用 GitHub Jekyll）-------------------
      - name: Create .nojekyll
        run: |
          touch build/WebGL/WebGL/.nojekyll
          # 确保 index.html 在最外层
          ls -la build/WebGL/WebGL/

      # -------------------- 5. 部署到 GitHub Pages --------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/WebGL/WebGL
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: Unity WebGL build [skip ci]"
